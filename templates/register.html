<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FloodSense — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050a0f; --surface:#0a1520; --card:#0f1e2e;
  --border:#1a3040; --accent:#00d4ff; --text:#e0f0ff;
  --muted:#4a7090; --red:#ef4444; --green:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 20% 30%,rgba(0,180,255,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 70%,rgba(0,80,120,.08) 0%,transparent 60%);
  pointer-events:none}
body::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,180,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,255,.025) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none}
.wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:56px;height:56px;border-radius:14px;margin:0 auto 12px;
  background:linear-gradient(135deg,#003d5c,#00d4ff18);border:1px solid var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 0 30px rgba(0,212,255,.2)}
.logo h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;
  color:var(--accent);letter-spacing:3px}
.logo p{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:1px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:30px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.card-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;
  font-family:'Space Mono',monospace}
.input-wrap{position:relative}
.input-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;pointer-events:none}
.input-wrap input{width:100%;padding:11px 14px 11px 38px;background:var(--surface);
  border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;
  font-family:'Outfit',sans-serif;outline:none;transition:border .2s,box-shadow .2s}
.input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.08)}
.input-wrap input::placeholder{color:var(--muted)}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:15px;color:var(--muted);
  padding:2px;transition:color .2s}
.eye-btn:hover{color:var(--accent)}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;
  display:flex;align-items:center;gap:8px}
.msg.error  {background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.msg.success{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);color:#86efac}
.hint{font-size:11px;color:var(--muted);margin-top:5px;padding-left:2px}

/* PASSWORD STRENGTH */
.strength-bar{height:3px;border-radius:2px;margin-top:6px;
  background:var(--border);overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.strength-label{font-size:10px;margin-top:3px;font-family:'Space Mono',monospace}

.submit-btn{width:100%;padding:13px;border:none;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;
  letter-spacing:.5px;transition:all .2s;
  background:linear-gradient(135deg,#004d6e,#007a9e);
  color:var(--accent);border:1px solid rgba(0,212,255,.3);
  margin-top:4px;position:relative;overflow:hidden}
.submit-btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,212,255,.12),transparent);
  opacity:0;transition:opacity .2s}
.submit-btn:hover::before{opacity:1}
.submit-btn:hover{box-shadow:0 0 25px rgba(0,212,255,.2);transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;
  color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.link-row{text-align:center;font-size:13px;color:var(--muted)}
.link-row a{color:var(--accent);text-decoration:none;font-weight:600}
.link-row a:hover{text-decoration:underline}
.footer{text-align:center;margin-top:20px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🌊</div>
    <h1>FLOODSENSE</h1>
    <p>FLOOD DISASTER MANAGEMENT SYSTEM</p>
  </div>

  <div class="card">
    <div class="card-title">Create Account</div>
    <div class="card-sub">Register to access the flood dashboard</div>

    {% if error %}
    <div class="msg error">⚠️ {{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="msg success">✅ {{ success }} <a href="/login" style="color:#86efac;margin-left:8px">Login →</a></div>
    {% endif %}

    <form method="POST" action="/register">

      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrap">
          <span class="icon">🪪</span>
          <input type="text" name="name" placeholder="e.g. Rahul Sharma"
            value="{{ name or '' }}" required>
        </div>
      </div>

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" name="username" placeholder="min. 3 characters, no spaces"
            value="{{ username or '' }}" required oninput="checkUser(this.value)">
        </div>
        <div class="hint" id="user-hint"></div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" name="password" id="pwd"
            placeholder="min. 6 characters" required oninput="checkStrength(this.value)">
          <button type="button" class="eye-btn" onclick="togglePwd('pwd')">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="sfill"></div></div>
        <div class="strength-label" id="slabel" style="color:var(--muted)"></div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" name="confirm_password" id="cpwd"
            placeholder="Repeat password" required oninput="checkMatch()">
          <button type="button" class="eye-btn" onclick="togglePwd('cpwd')">👁</button>
        </div>
        <div class="hint" id="match-hint"></div>
      </div>

      <button type="submit" class="submit-btn">✅ CREATE ACCOUNT</button>
    </form>

    <div class="divider">or</div>
    <div class="link-row">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
  <div class="footer">Maharashtra &amp; Uttarakhand · Flood Intelligence System</div>
</div>

<script>
function togglePwd(id) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
}
function checkUser(v) {
  const h = document.getElementById('user-hint');
  if (v.length > 0 && v.length < 3) {
    h.style.color = '#fca5a5'; h.textContent = '⚠ Too short';
  } else if (v.includes(' ')) {
    h.style.color = '#fca5a5'; h.textContent = '⚠ No spaces allowed';
  } else if (v.length >= 3) {
    h.style.color = '#86efac'; h.textContent = '✓ Looks good';
  } else { h.textContent = ''; }
}
function checkStrength(v) {
  const fill  = document.getElementById('sfill');
  const label = document.getElementById('slabel');
  let score = 0;
  if (v.length >= 6)  score++;
  if (v.length >= 10) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^a-zA-Z0-9]/.test(v)) score++;
  const levels = [
    { pct:'25%', color:'#ef4444', text:'Weak' },
    { pct:'50%', color:'#f97316', text:'Fair' },
    { pct:'75%', color:'#eab308', text:'Good' },
    { pct:'100%',color:'#22c55e', text:'Strong' },
  ];
  if (v.length === 0) { fill.style.width='0'; label.textContent=''; return; }
  const l = levels[Math.max(0, score-1)];
  fill.style.width = l.pct;
  fill.style.background = l.color;
  label.style.color = l.color;
  label.textContent = l.text + ' password';
}
function checkMatch() {
  const p = document.getElementById('pwd').value;
  const c = document.getElementById('cpwd').value;
  const h = document.getElementById('match-hint');
  if (c.length === 0) { h.textContent=''; return; }
  if (p === c) { h.style.color='#86efac'; h.textContent='✓ Passwords match'; }
  else         { h.style.color='#fca5a5'; h.textContent='⚠ Passwords do not match'; }
}
</script>
</body>
</html>
